<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件串口服务器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-8">
                <h1>软件串口服务器 (TCP Server + RFC2217)</h1>
            </div>
            <div class="col-md-4 text-end">
                <span id="service-status" class="badge bg-secondary">服务状态: 未知</span>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <button id="add-port-btn" class="btn btn-primary me-2">+ 新增端口</button>
                <button id="start-all-btn" class="btn btn-success me-2">启动全部服务</button>
                <button id="stop-all-btn" class="btn btn-danger">停止全部服务</button>
            </div>
        </div>

        <table id="ports-table" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>#</th>
                    <th>监听端口</th>
                    <th>模式</th>
                    <th>串口设备/参数</th>
                    <th>启用</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="ports-tbody">
                <tr>
                    <td colspan="6" class="text-center text-muted">暂无端口配置</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="edit-modal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="edit-modal-title">新增端口</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-port-original">
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">监听端口</label>
                            <input type="number" id="edit-port" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">模式</label>
                            <select id="edit-mode" class="form-select" onchange="toggleModeOptions()">
                                <option value="simulator">模拟器模式</option>
                                <option value="physical">物理串口模式</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">启用</label>
                            <div class="form-check mt-2">
                                <input type="checkbox" id="edit-enabled" class="form-check-input" checked>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3" id="physical-port-container" style="display: none;">
                        <div class="col-md-12">
                            <label class="form-label">物理串口设备</label>
                            <div class="input-group">
                                <select id="edit-serial-device" class="form-select">
                                    <option value="">选择串口设备...</option>
                                </select>
                                <button type="button" class="btn btn-outline-secondary" onclick="refreshSerialPorts()">刷新</button>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label">波特率</label>
                            <select id="edit-baud" class="form-select">
                                <option value="9600">9600</option>
                                <option value="19200">19200</option>
                                <option value="38400">38400</option>
                                <option value="57600">57600</option>
                                <option value="115200" selected>115200</option>
                                <option value="230400">230400</option>
                                <option value="460800">460800</option>
                                <option value="921600">921600</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">数据位</label>
                            <select id="edit-data-bits" class="form-select">
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8" selected>8</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">停止位</label>
                            <select id="edit-stop-bits" class="form-select">
                                <option value="1" selected>1</option>
                                <option value="1.5">1.5</option>
                                <option value="2">2</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">校验位</label>
                            <select id="edit-parity" class="form-select">
                                <option value="None" selected>None</option>
                                <option value="Odd">Odd</option>
                                <option value="Even">Even</option>
                                <option value="Mark">Mark</option>
                                <option value="Space">Space</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3" id="rules-container">
                        <label class="form-label">响应规则</label>
                        <button type="button" onclick="addRuleRow()" class="btn btn-sm btn-outline-secondary float-end">+ 添加规则</button>
                        <table class="table table-sm mt-2">
                            <thead>
                                <tr>
                                    <th>类型</th>
                                    <th>匹配模式</th>
                                    <th>响应内容</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="rules-tbody">
                                <tr class="rule-row">
                                    <td>
                                        <select class="form-select form-select-sm rule-type">
                                            <option value="exact" selected>精确</option>
                                            <option value="contains">包含</option>
                                            <option value="wildcard">通配符</option>
                                        </select>
                                    </td>
                                    <td><input type="text" class="form-control form-control-sm rule-match" placeholder="匹配模式"></td>
                                    <td><input type="text" class="form-control form-control-sm rule-reply" placeholder="响应内容"></td>
                                    <td><button type="button" onclick="removeRuleRow(this)" class="btn btn-sm btn-danger">删除</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="form-text text-muted">
                        转义符说明: \r = 回车, \n = 换行, \\ = 反斜杠
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" onclick="savePort()" class="btn btn-primary">保存并应用</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="view-rules-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">端口规则列表</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <table id="view-rules-table" class="table table-sm">
                        <thead>
                            <tr>
                                <th>类型</th>
                                <th>匹配模式</th>
                                <th>响应内容</th>
                            </tr>
                        </thead>
                        <tbody id="view-rules-tbody">
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentEditPort = null;

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, {
                headers: { 'Content-Type': 'application/json' },
                ...options
            });
            return await response.json();
        }

        async function loadPorts() {
            try {
                const [ports, status] = await Promise.all([
                    fetchJson('/api/ports'),
                    fetchJson('/api/service/status')
                ]);
                renderPorts(ports, status.running_ports || []);
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        function renderPorts(ports, runningPorts) {
            const tbody = document.getElementById('ports-tbody');
            if (!ports || ports.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无端口配置</td></tr>';
                return;
            }

            tbody.innerHTML = ports.map((port, index) => {
                const params = port.serial_params || {};
                const mode = port.mode || 'simulator';
                const modeText = mode === 'simulator' ? '模拟器' : '物理串口';
                const deviceText = mode === 'physical' ? (port.serial_device || '未设置') : '';
                const paramText = `${params.baud_rate || 9600}/${params.data_bits || 8}/${params.stop_bits || '1'}/${params.parity || 'None'}`;
                const isRunning = runningPorts.includes(port.port);
                const enabledIcon = isRunning ? '✓' : '×';
                const enabledClass = isRunning ? 'text-success' : 'text-danger';
                
                const fullParamDisplay = mode === 'physical' 
                    ? `${deviceText}<br><small>${paramText}</small>` 
                    : paramText;
                
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${port.port}</td>
                        <td>${modeText}</td>
                        <td>${fullParamDisplay}</td>
                        <td class="${enabledClass}">${enabledIcon}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="openEditModal(${port.port})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deletePort(${port.port})">删除</button>
                            ${mode === 'simulator' ? `<button class="btn btn-sm btn-info" onclick="openViewRulesModal(${port.port})">查看规则</button>` : ''}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function refreshSerialPorts() {
            try {
                const ports = await fetchJson('/api/serial-ports');
                const select = document.getElementById('edit-serial-device');
                select.innerHTML = '<option value="">选择串口设备...</option>';
                
                if (ports && ports.length > 0) {
                    ports.forEach(port => {
                        const option = document.createElement('option');
                        option.value = port.device;
                        option.textContent = `${port.device} - ${port.description || 'Unknown'}`;
                        select.appendChild(option);
                    });
                } else {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = '未检测到可用串口';
                    option.disabled = true;
                    select.appendChild(option);
                }
            } catch (error) {
                console.error('加载串口设备失败:', error);
            }
        }

        function toggleModeOptions() {
            const mode = document.getElementById('edit-mode').value;
            const physicalContainer = document.getElementById('physical-port-container');
            const rulesContainer = document.getElementById('rules-container');
            
            if (mode === 'physical') {
                physicalContainer.style.display = 'block';
                rulesContainer.style.display = 'none';
                refreshSerialPorts();
            } else {
                physicalContainer.style.display = 'none';
                rulesContainer.style.display = 'block';
            }
        }

        function addRuleRow() {
            const tbody = document.getElementById('rules-tbody');
            tbody.innerHTML += `
                <tr class="rule-row">
                    <td>
                        <select class="form-select form-select-sm rule-type">
                            <option value="exact" selected>精确</option>
                            <option value="contains">包含</option>
                            <option value="wildcard">通配符</option>
                        </select>
                    </td>
                    <td><input type="text" class="form-control form-control-sm rule-match" placeholder="匹配模式"></td>
                    <td><input type="text" class="form-control form-control-sm rule-reply" placeholder="响应内容"></td>
                    <td><button type="button" onclick="removeRuleRow(this)" class="btn btn-sm btn-danger">删除</button></td>
                </tr>
            `;
        }

        function removeRuleRow(btn) {
            const row = btn.closest('.rule-row');
            const rows = document.querySelectorAll('.rule-row');
            if (rows.length > 1) {
                row.remove();
            }
        }

        async function openEditModal(port = null) {
            currentEditPort = port;
            const modal = new bootstrap.Modal(document.getElementById('edit-modal'));
            const title = document.getElementById('edit-modal-title');
            const tbody = document.getElementById('rules-tbody');

            if (port) {
                title.textContent = `编辑端口 ${port}`;
                document.getElementById('edit-port-original').value = port;
                document.getElementById('edit-port').disabled = true;
                
                fetchJson('/api/ports').then(ports => {
                    const cfg = ports.find(p => p.port === port);
                    if (cfg) {
                        document.getElementById('edit-port').value = cfg.port;
                        document.getElementById('edit-enabled').checked = cfg.enabled || false;
                        document.getElementById('edit-mode').value = cfg.mode || 'simulator';
                        document.getElementById('edit-serial-device').value = cfg.serial_device || '';
                        
                        const params = cfg.serial_params || {};
                        document.getElementById('edit-baud').value = params.baud_rate || 9600;
                        document.getElementById('edit-data-bits').value = params.data_bits || 8;
                        document.getElementById('edit-stop-bits').value = params.stop_bits || '1';
                        document.getElementById('edit-parity').value = params.parity || 'None';
                        
                        toggleModeOptions();
                        
                        const rules = cfg.response_rules || [];
                        if (rules.length > 0) {
                            tbody.innerHTML = rules.map(rule => `
                                <tr class="rule-row">
                                    <td>
                                        <select class="form-select form-select-sm rule-type">
                                            <option value="exact" ${rule.type === 'exact' ? 'selected' : ''}>精确</option>
                                            <option value="contains" ${rule.type === 'contains' ? 'selected' : ''}>包含</option>
                                            <option value="wildcard" ${rule.type === 'wildcard' ? 'selected' : ''}>通配符</option>
                                        </select>
                                    </td>
                                    <td><input type="text" class="form-control form-control-sm rule-match" value="${rule.match || ''}"></td>
                                    <td><input type="text" class="form-control form-control-sm rule-reply" value="${rule.reply || ''}"></td>
                                    <td><button type="button" onclick="removeRuleRow(this)" class="btn btn-sm btn-danger">删除</button></td>
                                </tr>
                            `).join('');
                        }
                    }
                });
            } else {
                title.textContent = '新增端口';
                document.getElementById('edit-port-original').value = '';
                document.getElementById('edit-port').disabled = false;
                document.getElementById('edit-port').value = '';
                document.getElementById('edit-enabled').checked = true;
                document.getElementById('edit-mode').value = 'simulator';
                document.getElementById('edit-serial-device').value = '';
                
                toggleModeOptions();
                
                tbody.innerHTML = `
                    <tr class="rule-row">
                        <td>
                            <select class="form-select form-select-sm rule-type">
                                <option value="exact" selected>精确</option>
                                <option value="contains">包含</option>
                                <option value="wildcard">通配符</option>
                            </select>
                        </td>
                        <td><input type="text" class="form-control form-control-sm rule-match" placeholder="匹配模式"></td>
                        <td><input type="text" class="form-control form-control-sm rule-reply" placeholder="响应内容"></td>
                        <td><button type="button" onclick="removeRuleRow(this)" class="btn btn-sm btn-danger">删除</button></td>
                    </tr>
                `;
            }

            modal.show();
        }

        async function savePort() {
            const originalPort = document.getElementById('edit-port-original').value;
            const port = parseInt(document.getElementById('edit-port').value);
            const mode = document.getElementById('edit-mode').value;
            
            const rules = [];
            if (mode === 'simulator') {
                document.querySelectorAll('.rule-row').forEach(row => {
                    const type = row.querySelector('.rule-type').value;
                    const match = row.querySelector('.rule-match').value;
                    const reply = row.querySelector('.rule-reply').value;
                    if (match || reply) {
                        rules.push({ type, match, reply });
                    }
                });
            }

            const config = {
                port,
                enabled: document.getElementById('edit-enabled').checked,
                mode,
                serial_device: document.getElementById('edit-serial-device').value,
                serial_params: {
                    baud_rate: parseInt(document.getElementById('edit-baud').value),
                    data_bits: parseInt(document.getElementById('edit-data-bits').value),
                    stop_bits: document.getElementById('edit-stop-bits').value,
                    parity: document.getElementById('edit-parity').value
                },
                response_rules: rules
            };

            try {
                if (originalPort) {
                    await fetchJson(`/api/ports/${parseInt(originalPort)}`, {
                        method: 'PUT',
                        body: JSON.stringify(config)
                    });
                } else {
                    await fetchJson('/api/ports', {
                        method: 'POST',
                        body: JSON.stringify(config)
                    });
                }
                
                bootstrap.Modal.getInstance(document.getElementById('edit-modal')).hide();
                await loadPorts();
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }

        async function openViewRulesModal(port) {
            const modal = new bootstrap.Modal(document.getElementById('view-rules-modal'));
            const tbody = document.getElementById('view-rules-tbody');

            try {
                const ports = await fetchJson('/api/ports');
                const cfg = ports.find(p => p.port === port);
                const rules = cfg?.response_rules || [];

                if (rules.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">暂无规则</td></tr>';
                } else {
                    tbody.innerHTML = rules.map(rule => {
                        const typeText = { exact: '精确', contains: '包含', wildcard: '通配符' }[rule.type] || rule.type;
                        return `<tr><td>${typeText}</td><td>${rule.match || ''}</td><td>${rule.reply || ''}</td></tr>`;
                    }).join('');
                }

                modal.show();
            } catch (error) {
                alert('加载失败: ' + error.message);
            }
        }

        async function deletePort(port) {
            if (confirm(`确定删除端口 ${port} 吗？`)) {
                try {
                    await fetchJson(`/api/ports/${port}`, { method: 'DELETE' });
                    await loadPorts();
                } catch (error) {
                    alert('删除失败: ' + error.message);
                }
            }
        }

        async function updateServiceStatus() {
            try {
                const status = await fetchJson('/api/service/status');
                const badge = document.getElementById('service-status');
                badge.className = status.service_running ? 'badge bg-success' : 'badge bg-danger';
                badge.textContent = status.service_running ? '服务状态: 运行中' : '服务状态: 已停止';
            } catch (error) {
                console.error('更新状态失败:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadPorts();
            updateServiceStatus();
            setInterval(updateServiceStatus, 2000);
            
            document.getElementById('add-port-btn').addEventListener('click', () => openEditModal(null));
            document.getElementById('start-all-btn').addEventListener('click', async () => {
                await fetchJson('/api/service/start', { method: 'POST' });
                await loadPorts();
                updateServiceStatus();
            });
            document.getElementById('stop-all-btn').addEventListener('click', async () => {
                if (confirm('确定停止所有服务吗？')) {
                    await fetchJson('/api/service/stop', { method: 'POST' });
                    await loadPorts();
                    updateServiceStatus();
                }
            });
        });
    </script>
</body>
</html>
